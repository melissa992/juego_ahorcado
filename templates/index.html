<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Ahorcado</title>
        <!-- use Bootstrap for consistent styling both locally and on Vercel -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-qsOFlPO4iq4Y#t3?" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Juego del Ahorcado</h1>
        </header>
        
        <main class="game-main">
            <section class="hangman-section">
                <div id="hangman-art" class="hangman-art">
+---+
|   |
    |
    |
    |
    |
=========
                </div>
                    </pre>
                </div>
            </section>
            
            <section class="game-info">
                <p id="category">Categoría: Cargando...</p>
                <p id="word-display">_ _ _ _ _</p>
                <p id="attempts">Intentos restantes: 6</p>
                <p id="used-letters">Letras usadas: </p>
            </section>
            
            <section class="controls">
                <div class="input-section">
                    <input type="text" id="letter-input" maxlength="1" placeholder="Letra" aria-label="Ingresa una letra">
                    <button id="guess-btn" aria-label="Adivinar letra">Adivinar</button>
                </div>
                
                <button id="new-game-btn" aria-label="Iniciar nuevo juego">Nuevo Juego</button>
            </section>
            
            <section class="messages">
                <div id="message" class="message" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
