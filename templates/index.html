<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Ahorcado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Juego del Ahorcado</h1>
        
        <div id="hangman-art" class="hangman-art">
            <pre>
     +---+
     |   |
         |
         |
         |
         |
=========
            </pre>
        </div>
        
        <div class="game-info">
            <p id="category">Categoría: Cargando...</p>
            <p id="word-display">_ _ _ _ _</p>
            <p id="attempts">Intentos restantes: 6</p>
            <p id="used-letters">Letras usadas: </p>
        </div>
        
        <div class="input-section">
            <input type="text" id="letter-input" maxlength="1" placeholder="Ingresa una letra">
            <button id="guess-btn">Adivinar</button>
        </div>
        
        <button id="new-game-btn">Nuevo Juego</button>
        
        <div id="message" class="message"></div>
    </div>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
